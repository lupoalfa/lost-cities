<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost Cities · Online</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f2e8d0;
    --parchment-dark: #e0d0b0;
    --ink: #2a1f0e;
    --ink-light: #5a4a2e;
    --gold: #c9a227;
    --gold-light: #e8c547;
    --red:    #c0392b;
    --blue:   #2471a3;
    --green:  #1e8449;
    --yellow: #d4ac0d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--ink);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    color: var(--ink);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 40px,#ffffff03 40px,#ffffff03 41px);
    pointer-events: none; z-index: 0;
  }
  #app {
    position: relative; z-index: 1;
    width: 100%; max-width: 960px;
    padding: 12px; display: flex; flex-direction: column; gap: 10px;
    min-height: 100vh;
  }
  header { text-align: center; padding: 10px 0 4px; }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem,4vw,2.2rem); font-weight: 900;
    color: var(--gold); text-shadow: 0 2px 8px #00000080; letter-spacing: .08em;
  }
  header p.sub { font-style: italic; color: var(--parchment-dark); font-size: .9rem; opacity: .8; }

  .panel {
    background: var(--parchment); border-radius: 6px;
    border: 2px solid var(--gold); box-shadow: 0 4px 20px #00000060;
    padding: 10px 14px; position: relative;
  }
  .panel::before {
    content: ''; position: absolute; inset: 3px;
    border: 1px solid var(--gold-light); border-radius: 4px; opacity: .3; pointer-events: none;
  }
  .panel-title {
    font-family: 'Cinzel', serif; font-size: .65rem;
    letter-spacing: .15em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px;
  }

  /* ── LOBBY ── */
  #lobby { max-width: 460px; margin: 30px auto; text-align: center; }
  #lobby h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 8px; }
  #lobby p { color: var(--ink-light); line-height: 1.6; margin-bottom: 16px; }
  .lobby-input {
    width: 100%; padding: 10px 12px; border-radius: 4px;
    border: 2px solid var(--ink-light); background: #fff8ee;
    font-family: 'Crimson Pro', serif; font-size: 1rem; color: var(--ink);
    margin-bottom: 8px; outline: none;
  }
  .lobby-input:focus { border-color: var(--gold); }
  .btn {
    padding: 10px 22px; border-radius: 4px; border: 2px solid var(--gold);
    background: var(--ink); color: var(--gold);
    font-family: 'Cinzel', serif; font-size: .82rem; letter-spacing: .05em;
    cursor: pointer; transition: all .15s; display: inline-block;
  }
  .btn:hover:not(:disabled) { background: var(--gold); color: var(--ink); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.full { width: 100%; display: block; margin: 6px 0; }
  .btn.secondary { background: var(--parchment); color: var(--ink); border-color: var(--ink-light); }
  .btn.secondary:hover:not(:disabled) { background: var(--ink-light); color: var(--parchment); }
  .btn.sm { padding: 6px 14px; font-size: .72rem; }

  .divider { display: flex; align-items: center; gap: 10px; margin: 10px 0; color: var(--ink-light); font-size: .85rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--parchment-dark); }

  /* room code display */
  .room-code-box {
    background: var(--ink); color: var(--gold);
    border-radius: 4px; padding: 10px 16px;
    font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: .2em;
    text-align: center; margin: 12px 0; cursor: pointer; position: relative;
  }
  .room-code-box::after { content: '클릭하여 복사'; font-size: .55rem; display: block; letter-spacing: .1em; opacity: .6; margin-top: 2px; }
  .copied-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #fff;
    padding: 8px 20px; border-radius: 20px; font-size: .85rem;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  .copied-toast.show { opacity: 1; }

  /* waiting */
  .waiting-dots span {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--gold); margin: 0 2px;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .waiting-dots span:nth-child(2) { animation-delay: .2s; }
  .waiting-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* ── GAME UI ── */
  #top-bar { display: flex; align-items: center; gap: 8px; }
  .score-box { flex: 1; text-align: center; }
  .score-name { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.12em; color:var(--ink-light); text-transform:uppercase; }
  .score-val { font-family:'Cinzel',serif; font-size:1.5rem; font-weight:700; color:var(--ink); }
  .score-box.active-turn .score-name { color: var(--gold); }
  .score-box.active-turn .score-val { color: var(--gold); }
  .round-info { text-align:center; padding:0 12px; }
  .deck-count { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:700; color:var(--ink); }
  .deck-label { font-size:.65rem; color:var(--ink-light); text-transform:uppercase; letter-spacing:.1em; }

  /* board */
  .color-row { display:grid; grid-template-columns:1fr 42px 1fr; gap:4px; align-items:start; margin-bottom:4px; }
  .expedition { display:flex; flex-direction:column; gap:2px; min-height:36px; }
  .expedition.right { align-items:flex-end; }
  .expedition-cards { display:flex; flex-wrap:wrap; gap:3px; }
  .expedition.right .expedition-cards { justify-content:flex-end; }

  .discard-center { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .discard-stack { position:relative; width:38px; height:54px; cursor:pointer; }
  .discard-stack .card { position:absolute; top:0; left:0; width:100%; }
  .discard-empty {
    width:38px; height:54px; border:1.5px dashed; border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    font-size:.55rem; opacity:.5; font-family:'Cinzel',serif;
    text-transform:uppercase; letter-spacing:.05em; cursor:pointer;
  }

  /* cards */
  .card {
    width:38px; height:54px; border-radius:4px; border:1.5px solid rgba(0,0,0,.25);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-weight:700; font-size:1rem;
    cursor:pointer; transition:transform .15s, box-shadow .15s;
    user-select:none; flex-shrink:0;
  }
  .card:hover { transform:translateY(-3px); box-shadow:0 4px 12px #00000050; }
  .card.selected { transform:translateY(-8px); box-shadow:0 6px 16px #00000070; outline:2px solid var(--gold); }
  .card.back {
    background:repeating-linear-gradient(45deg,#2a3a4a,#2a3a4a 4px,#1a2a3a 4px,#1a2a3a 8px);
    cursor:default; border-color:#3a5a7a;
  }
  .card.back:hover { transform:none; box-shadow:none; }
  .card.red    { background:linear-gradient(160deg,#ff6b55,#c0392b); color:#fff; border:none; }
  .card.blue   { background:linear-gradient(160deg,#5ba4e8,#1a5fa8); color:#fff; border:none; }
  .card.white  { background:linear-gradient(160deg,#f0f0f0,#9ca3af); color:#555; border:none; }
  .card.green  { background:linear-gradient(160deg,#4ade80,#15803d); color:#fff; border:none; }
  .card.yellow { background:linear-gradient(160deg,#fde047,#d97706); color:#fff; border:none; }
  .card.red.played    { background:linear-gradient(160deg,#ff6b55,#c0392b); color:#fff; border:none; box-shadow:inset 0 0 0 2px #8b1a0e; }
  .card.blue.played   { background:linear-gradient(160deg,#5ba4e8,#1a5fa8); color:#fff; border:none; box-shadow:inset 0 0 0 2px #0f3a70; }
  .card.white.played  { background:linear-gradient(160deg,#f0f0f0,#9ca3af); color:#fff; border:none; box-shadow:inset 0 0 0 2px #555; }
  .card.green.played  { background:linear-gradient(160deg,#4ade80,#15803d); color:#fff; border:none; box-shadow:inset 0 0 0 2px #0f4a25; }
  .card.yellow.played { background:linear-gradient(160deg,#fde047,#d97706); color:#fff; border:none; box-shadow:inset 0 0 0 2px #8a6800; }
  .card-wager { font-size:.7rem; }

  #hand-cards { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; padding:4px; }
  #opponent-area { display:flex; align-items:center; justify-content:space-between; padding:6px 8px; gap:6px; }
  #opponent-hand-display { display:flex; gap:3px; flex-wrap:wrap; flex:1; justify-content:flex-end; }
  .opp-card-back { width:28px; height:40px; border-radius:3px; background:repeating-linear-gradient(45deg,#2a3a4a,#2a3a4a 3px,#1a2a3a 3px,#1a2a3a 6px); border:1px solid #3a5a7a; }

  #status-bar {
    text-align:center; padding:7px; background:var(--parchment-dark); border-radius:4px;
    font-size:.9rem; color:var(--ink-light); font-style:italic;
    min-height:34px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  #action-area { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }

  .turn-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
  .phase-chip { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.65rem; font-family:'Cinzel',serif; letter-spacing:.05em; border:1px solid currentColor; margin-left:6px; }
  .phase-chip.play { color:var(--blue); }
  .phase-chip.draw { color:var(--green); }

  .draw-highlight { outline:2px solid var(--gold-light); animation:glow 1s ease-in-out infinite alternate; }
  @keyframes glow { from{box-shadow:0 0 4px var(--gold)} to{box-shadow:0 0 12px var(--gold-light)} }

  /* end screen */
  #end-screen { max-width:560px; margin:20px auto; text-align:center; }
  #end-screen h2 { font-family:'Cinzel',serif; font-size:1.8rem; color:var(--ink); margin-bottom:4px; }
  .score-table { width:100%; border-collapse:collapse; margin:14px 0; font-size:.88rem; }
  .score-table th { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:5px 8px; border-bottom:2px solid var(--gold); }
  .score-table td { padding:5px 8px; border-bottom:1px solid var(--parchment-dark); }
  .score-table .total-row td { font-family:'Cinzel',serif; font-weight:700; border-top:2px solid var(--gold); border-bottom:none; }
  .winner-banner { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--gold); margin:8px 0 14px; }

  /* connection badge */
  .conn-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:20px; font-size:.7rem;
    font-family:'Cinzel',serif; letter-spacing:.05em;
  }
  .conn-badge.connected { background:#eaffea; color:var(--green); border:1px solid var(--green); }
  .conn-badge.waiting   { background:#fff8e0; color:#8a6800;       border:1px solid #d4ac0d; }
  .conn-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
  .conn-badge.connected .conn-dot { animation:pulse 2s ease-in-out infinite; }

  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>⚜ LOST CITIES ⚜</h1>
    <p class="sub">잃어버린 도시를 향한 탐험 — 온라인 대전</p>
  </header>

  <div id="copied-toast" class="copied-toast">링크 복사됨!</div>

  <!-- ── LOBBY ── -->
  <div id="lobby" class="panel">
    <h2>탐험 로비</h2>
    <p>닉네임을 입력하고 방을 만들거나, 친구에게 받은 방 코드로 참가하세요.</p>
    <input class="lobby-input" id="nickname-input" placeholder="닉네임 (예: 탐험가)" maxlength="12">

    <button class="btn full" onclick="createRoom()">🗺️ 새 방 만들기</button>
    <div class="divider">또는</div>
    <input class="lobby-input" id="room-code-input" placeholder="방 코드 입력 (예: ABCD)" maxlength="6" style="text-transform:uppercase; letter-spacing:.1em;">
    <button class="btn full secondary" onclick="joinRoom()">🔑 방 참가</button>

    <div id="lobby-status" style="margin-top:10px; color:var(--red); font-size:.9rem; min-height:20px;"></div>
  </div>

  <!-- ── WAITING ROOM ── -->
  <div id="waiting-room" class="panel hidden" style="max-width:460px; margin:30px auto; text-align:center;">
    <div class="panel-title">방 대기 중</div>
    <p style="margin-bottom:14px; color:var(--ink-light);">친구에게 아래 코드를 공유하세요</p>
    <div class="room-code-box" id="room-code-display" onclick="copyRoomLink()"></div>
    <p style="font-size:.82rem; color:var(--ink-light); margin-bottom:16px;">또는 링크: <span id="room-link" style="color:var(--blue); word-break:break-all;"></span></p>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:12px 0;">
      <div class="waiting-dots"><span></span><span></span><span></span></div>
      <span style="color:var(--ink-light); font-size:.9rem;">상대방 접속 대기 중...</span>
    </div>
    <button class="btn sm secondary" onclick="leaveRoom()" style="margin-top:8px;">나가기</button>
  </div>

  <!-- ── GAME UI ── -->
  <div id="game-ui" class="hidden">
    <div class="panel" id="top-bar">
      <div class="score-box" id="p1-box">
        <div class="score-name" id="p1-name">—</div>
        <div class="score-val" id="p1-score">0</div>
      </div>
      <div class="round-info">
        <div class="deck-count" id="deck-count">44</div>
        <div class="deck-label">남은 카드</div>
        <div style="margin-top:4px;" id="conn-badge-wrap"></div>
      </div>
      <div class="score-box" id="p2-box">
        <div class="score-name" id="p2-name">—</div>
        <div class="score-val" id="p2-score">0</div>
      </div>
    </div>

    <div class="panel" id="opponent-area">
      <div><div class="panel-title" id="opp-label">상대방 손패</div></div>
      <div id="opponent-hand-display"></div>
    </div>

    <div class="panel" id="board">
      <div class="panel-title">탐험 루트</div>
      <div id="color-rows"></div>
    </div>

    <div id="status-bar">—</div>

    <div class="panel" id="hand-area">
      <div class="panel-title" id="hand-label">내 손패</div>
      <div id="hand-cards"></div>
    </div>

    <div id="action-area">
      <button class="btn" id="btn-discard" onclick="discardSelected()" disabled>버리기</button>
      <button class="btn" id="btn-draw-deck" onclick="drawFrom('deck')" disabled>덱에서 뽑기</button>
      <button class="btn secondary sm" onclick="leaveRoom()">나가기</button>
    </div>
  </div>

  <!-- ── END SCREEN ── -->
  <div id="end-screen" class="panel hidden">
    <h2>탐험 종료</h2>
    <div class="winner-banner" id="winner-text"></div>
    <table class="score-table" id="score-table"></table>
    <div style="margin-top:10px; display:flex; gap:8px; justify-content:center;">
      <button class="btn" id="btn-rematch" onclick="requestRematch()">다시 하기</button>
      <button class="btn secondary" onclick="leaveRoom()">메뉴로</button>
    </div>
    <div id="rematch-status" style="margin-top:8px; font-size:.85rem; color:var(--ink-light);"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAICW5kMm0uxsbPi7sSEPq85BUgzVx4zAI",
  authDomain: "lost-cities-game-f9836.firebaseapp.com",
  databaseURL: "https://lost-cities-game-f9836-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lost-cities-game-f9836",
  storageBucket: "lost-cities-game-f9836.firebasestorage.app",
  messagingSenderId: "671019100108",
  appId: "1:671019100108:web:398a28cc290523a0bfdf69"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ── CONSTANTS ──
const COLORS = ['red','blue','white','green','yellow'];
const COLOR_KR = {red:'❤️ 붉은',blue:'💙 푸른',white:'🤍 흰',green:'💚 초록',yellow:'💛 황금'};
const COST = 20;

// ── LOCAL STATE ──
let myRole = null;       // 'host' | 'guest'
let myNickname = '';
let roomId = null;
let gameState = null;    // latest snapshot from Firebase
let selectedCard = null;
let roomRef = null;
let unsubscribe = null;

// ── HELPERS ──
function $(id){ return document.getElementById(id); }
function show(id){ $(id).classList.remove('hidden'); }
function hide(id){ $(id).classList.add('hidden'); }
function lobbyErr(msg){ $('lobby-status').textContent = msg; }

function randId(len=5){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:len},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
}

function showToast(msg){
  const t=$('copied-toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

window.copyRoomLink = function(){
  const url = `${location.origin}${location.pathname}?room=${roomId}`;
  navigator.clipboard.writeText(url).then(()=>showToast('링크 복사됨!'));
};

// ── DECK ──
function createDeck(){
  const d=[];
  for(const c of COLORS){
    for(let i=0;i<3;i++) d.push({color:c,value:'W',id:`${c}-W-${i}`});
    for(const v of [2,3,4,5,6,7,8,9,10]) d.push({color:c,value:v,id:`${c}-${v}`});
  }
  return shuffle(d);
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── FIREBASE 배열 안전 변환 ──
// Firebase는 빈 배열을 null로, 배열을 {0:...,1:...} 객체로 바꾸는 경우가 있음
function toArr(val){
  if(!val) return [];
  if(Array.isArray(val)) return val;
  return Object.values(val);
}
function safeExp(exp){
  const r={};
  for(const c of COLORS) r[c]=toArr(exp?.[c]);
  return r;
}
function safeDiscards(dp){
  const r={};
  for(const c of COLORS) r[c]=toArr(dp?.[c]);
  return r;
}

// ── SCORING ──
function calcExpeditionScore(cards){
  const arr=toArr(cards);
  if(arr.length===0) return 0;
  const wagers=arr.filter(c=>c.value==='W').length;
  const sum=arr.filter(c=>c.value!=='W').reduce((s,c)=>s+Number(c.value),0);
  let score=(sum-COST)*(wagers+1);
  if(arr.length>=8) score+=20;
  return score;
}
function calcTotalScore(expeditions){
  let t=0;
  for(const c of COLORS) t+=calcExpeditionScore(toArr(expeditions?.[c]));
  return t;
}

function canPlayCard(card, expeditions){
  const exp=toArr(expeditions?.[card.color]);
  if(exp.length===0) return true;
  const last=exp[exp.length-1];
  if(card.value==='W') return last.value==='W';
  if(last.value==='W') return true;
  return Number(card.value)>Number(last.value);
}

// ── ROOM CREATION ──
window.createRoom = async function(){
  const nick=$('nickname-input').value.trim()||'탐험가';
  myNickname=nick; myRole='host';
  roomId=randId();

  const deck=createDeck();
  const hand0=[],hand1=[];
  for(let i=0;i<8;i++){ hand0.push(deck.pop()); hand1.push(deck.pop()); }

  const initExpeditions={};
  const initDiscard={};
  for(const c of COLORS){ initExpeditions[c]=[]; initDiscard[c]=[]; }

  const state={
    phase:'waiting',
    players:{
      host:{nickname:nick,hand:hand0,expeditions:{...initExpeditions}},
      guest:{nickname:'',hand:hand1,expeditions:{...initExpeditions}}
    },
    deck,
    discardPiles:initDiscard,
    currentTurn:'host',
    actionPhase:'play',
    rematch:{host:false,guest:false}
  };

  roomRef=ref(db,`rooms/${roomId}`);
  await set(roomRef, state);
  listenRoom();

  hide('lobby');
  show('waiting-room');
  $('room-code-display').textContent=roomId;
  $('room-link').textContent=`${location.origin}${location.pathname}?room=${roomId}`;
  // update URL
  history.replaceState(null,'',`?room=${roomId}`);
};

window.joinRoom = async function(){
  const nick=$('nickname-input').value.trim()||'탐험가';
  const code=$('room-code-input').value.trim().toUpperCase();
  if(!code){ lobbyErr('방 코드를 입력하세요'); return; }

  myNickname=nick; myRole='guest'; roomId=code;
  roomRef=ref(db,`rooms/${roomId}`);

  const snap=await get(roomRef);
  if(!snap.exists()){ lobbyErr('방을 찾을 수 없습니다.'); return; }
  const data=snap.val();
  if(data.phase!=='waiting'){ lobbyErr('이미 게임이 시작된 방입니다.'); return; }

  // 닉네임 저장 + phase를 playing으로 한 번에 업데이트
  await update(ref(db,`rooms/${roomId}`),{
    'players/guest/nickname': nick,
    phase: 'playing'
  });

  listenRoom();
  hide('lobby');
  history.replaceState(null,'',`?room=${roomId}`);
};

function listenRoom(){
  if(unsubscribe) off(roomRef);
  unsubscribe=onValue(roomRef,(snap)=>{
    if(!snap.exists()) return;
    gameState=snap.val();
    handleStateUpdate(gameState);
  });
}

window.leaveRoom = function(){
  if(unsubscribe && roomRef){ off(roomRef); unsubscribe=null; }
  if(roomId && myRole==='host'){ remove(ref(db,`rooms/${roomId}`)); }
  roomId=null; myRole=null; selectedCard=null; gameState=null;
  hide('game-ui'); hide('waiting-room'); hide('end-screen');
  show('lobby');
  history.replaceState(null,'',location.pathname);
};

function handleStateUpdate(state){
  // myRole이 설정되지 않은 경우 무시 (리스너가 너무 일찍 실행된 경우)
  if(!myRole) return;

  if(state.phase==='waiting'){
    show('waiting-room');
    hide('game-ui'); hide('end-screen'); hide('lobby');
    return;
  }
  if(state.phase==='playing'){
    // 게스트 참가 완료 → 양쪽 모두 게임 화면으로 전환
    hide('waiting-room'); hide('lobby'); hide('end-screen');
    show('game-ui');
    try { renderGame(state); } catch(e){ console.error('renderGame error:', e); }
    return;
  }
  if(state.phase==='ended'){
    hide('game-ui'); hide('waiting-room'); hide('lobby');
    show('end-screen');
    try { renderEndScreen(state); } catch(e){ console.error('renderEndScreen error:', e); }
    return;
  }
}

// ── GAME RENDERING ──
function myPlayerKey(){ return myRole; } // 'host' | 'guest'
function oppKey(){ return myRole==='host'?'guest':'host'; }

function isMyTurn(state){
  return state.currentTurn===myRole;
}

function renderGame(state){
  if(!myRole || !state.players) return;
  const me=state.players[myRole];
  const opp=state.players[oppKey()];
  if(!me || !opp) return;

  // names & scores
  const meScore=calcTotalScore(me.expeditions);
  const oppScore=calcTotalScore(opp.expeditions);

  // who is host in UI = left side
  const leftKey='host', rightKey='guest';
  const leftP=state.players[leftKey], rightP=state.players[rightKey];

  $('p1-name').textContent=leftP.nickname||(leftKey==='host'?'방장':'게스트');
  $('p2-name').textContent=rightP.nickname||(rightKey==='host'?'방장':'게스트');
  $('p1-score').textContent=calcTotalScore(leftP.expeditions);
  $('p2-score').textContent=calcTotalScore(rightP.expeditions);
  $('deck-count').textContent=toArr(state.deck).length;

  // highlight whose turn
  $('p1-box').classList.toggle('active-turn', state.currentTurn===leftKey);
  $('p2-box').classList.toggle('active-turn', state.currentTurn===rightKey);

  // connection badge
  $('conn-badge-wrap').innerHTML=`<span class="conn-badge connected"><span class="conn-dot"></span>연결됨</span>`;

  // opponent hand (backs)
  const oppHand=toArr(opp.hand);
  $('opp-label').textContent=`${opp.nickname||'상대방'} 손패 (${oppHand.length}장)`;
  const oppHandEl=$('opponent-hand-display');
  oppHandEl.innerHTML='';
  for(let i=0;i<oppHand.length;i++){
    const d=document.createElement('div'); d.className='opp-card-back'; oppHandEl.appendChild(d);
  }

  // board
  renderBoard(state);

  // hand
  const myHand=toArr(me.hand);
  $('hand-label').textContent=`${me.nickname||'나'} 손패 (${myHand.length}장)`;
  renderHand(state);

  // status
  if(isMyTurn(state)){
    const phaseText=state.actionPhase==='play'?'카드를 내거나 버리세요':'카드를 뽑으세요';
    const cls=state.actionPhase==='play'?'play':'draw';
    setStatus(`<span class="turn-dot"></span> <b>내 차례</b> — ${phaseText} <span class="phase-chip ${cls}">${state.actionPhase==='play'?'플레이':'드로우'}</span>`);
  } else {
    setStatus(`<span class="turn-dot" style="background:#888"></span> <b>${opp.nickname||'상대방'}</b>의 차례...`);
  }

  // buttons
  const myTurn=isMyTurn(state);
  const drawPhase=state.actionPhase==='draw';
  $('btn-discard').disabled=!myTurn||drawPhase||!selectedCard;
  $('btn-draw-deck').disabled=!myTurn||!drawPhase;
  $('btn-draw-deck').textContent=`덱에서 뽑기 (${toArr(state.deck).length}장)`;

  // dynamic play button
  let playBtn=$('btn-play-dyn');
  if(selectedCard && !drawPhase && myTurn){
    if(!playBtn){
      playBtn=document.createElement('button');
      playBtn.id='btn-play-dyn'; playBtn.className='btn';
      playBtn.onclick=()=>doPlay();
      $('action-area').insertBefore(playBtn,$('btn-discard'));
    }
    const ok=canPlayCard(selectedCard, me.expeditions);
    playBtn.textContent=ok?'✓ 탐험에 투자':'✗ 투자 불가';
    playBtn.disabled=!ok;
  } else {
    if(playBtn) playBtn.remove();
  }
}

function renderBoard(state){
  const rows=$('color-rows');
  rows.innerHTML='';
  const leftExp=safeExp(state.players['host'].expeditions);
  const rightExp=safeExp(state.players['guest'].expeditions);
  const discards=safeDiscards(state.discardPiles);
  const myTurn=isMyTurn(state);
  const drawPhase=state.actionPhase==='draw';

  for(const c of COLORS){
    const row=document.createElement('div'); row.className='color-row';

    // host expedition (left)
    const leftDiv=document.createElement('div'); leftDiv.className='expedition left';
    const lt=document.createElement('div'); lt.className='panel-title';
    const sc0=calcExpeditionScore(leftExp[c]||[]);
    lt.textContent=`${COLOR_KR[c]}  ${sc0>0?'+':''}${sc0}`;
    leftDiv.appendChild(lt);
    const lc=document.createElement('div'); lc.className='expedition-cards';
    for(const card of (leftExp[c]||[])) lc.innerHTML+=cardHTML(card,false,false,true);
    leftDiv.appendChild(lc); row.appendChild(leftDiv);

    // discard center
    const center=document.createElement('div'); center.className='discard-center';
    const pile=discards[c]||[];
    if(pile.length===0){
      const emp=document.createElement('div');
      emp.className='discard-empty'; emp.style.color=colorHex(c); emp.style.borderColor=colorHex(c);
      if(myTurn&&drawPhase) emp.classList.add('draw-highlight');
      emp.onclick=()=>{ if(myTurn&&drawPhase) doDrawDiscard(c); };
      emp.textContent='?';
      center.appendChild(emp);
    } else {
      const stack=document.createElement('div'); stack.className='discard-stack';
      if(myTurn&&drawPhase) stack.classList.add('draw-highlight');
      stack.onclick=()=>{ if(myTurn&&drawPhase) doDrawDiscard(c); };
      stack.innerHTML=cardHTML(pile[pile.length-1],false,false,false);
      center.appendChild(stack);
      const cnt=document.createElement('div');
      cnt.style.cssText='font-size:.6rem;color:var(--ink-light)';
      cnt.textContent=pile.length+'장'; center.appendChild(cnt);
    }
    row.appendChild(center);

    // guest expedition (right)
    const rightDiv=document.createElement('div'); rightDiv.className='expedition right';
    const rt=document.createElement('div'); rt.className='panel-title'; rt.style.textAlign='right';
    const sc1=calcExpeditionScore(rightExp[c]||[]);
    rt.textContent=`${sc1>0?'+':''}${sc1}  ${COLOR_KR[c]}`;
    rightDiv.appendChild(rt);
    const rc=document.createElement('div'); rc.className='expedition-cards'; rc.style.justifyContent='flex-end';
    for(const card of (rightExp[c]||[])) rc.innerHTML+=cardHTML(card,false,false,true);
    rightDiv.appendChild(rc); row.appendChild(rightDiv);

    rows.appendChild(row);
  }
}

function renderHand(state){
  const me=state.players[myRole];
  const container=$('hand-cards'); container.innerHTML='';
  const myTurn=isMyTurn(state);
  const playPhase=state.actionPhase==='play';

  for(const card of toArr(me.hand)){
    const isSel=selectedCard?.id===card.id;
    const div=document.createElement('div');
    div.innerHTML=cardHTML(card, myTurn&&playPhase, isSel, false);
    const el=div.firstChild;
    if(myTurn&&playPhase){
      el.onclick=()=>{
        selectedCard=selectedCard?.id===card.id?null:card;
        renderGame(state);
      };
      el.ondblclick=(e)=>{
        e.stopPropagation();
        selectedCard=card;
        doPlay();
      };
    }
    container.appendChild(el);
  }
}

function cardHTML(card, selectable, isSelected, isPlayed){
  const sel=isSelected?' selected':'';
  const played=isPlayed?' played':'';
  const label=card.value==='W'?'✦':card.value;
  return `<div class="card ${card.color}${sel}${played}" style="${selectable?'':'cursor:default'}">
    ${card.value==='W'?`<span class="card-wager">×</span>`:label}
  </div>`;
}

function colorHex(c){
  return {red:'#c0392b',blue:'#2471a3',white:'#777',green:'#1e8449',yellow:'#d4ac0d'}[c];
}

function setStatus(html){ $('status-bar').innerHTML=html; }

// ── ACTIONS (write to Firebase) ──
async function doPlay(){
  if(!selectedCard||!gameState) return;
  const state=gameState;
  if(!isMyTurn(state)||state.actionPhase!=='play') return;
  const me=state.players[myRole];
  if(!canPlayCard(selectedCard, me.expeditions)){ setStatus('⚠️ 이 카드는 현재 낼 수 없습니다.'); return; }

  const newHand=toArr(me.hand).filter(c=>c.id!==selectedCard.id);
  const newExp=safeExp(me.expeditions);
  newExp[selectedCard.color]=[...newExp[selectedCard.color], selectedCard];

  await update(ref(db,`rooms/${roomId}/players/${myRole}`),{hand:newHand, expeditions:newExp});
  await update(ref(db,`rooms/${roomId}`),{actionPhase:'draw'});
  selectedCard=null;
}

window.discardSelected = async function(){
  if(!selectedCard||!gameState) return;
  const state=gameState;
  if(!isMyTurn(state)||state.actionPhase!=='play') return;
  const me=state.players[myRole];
  const newHand=toArr(me.hand).filter(c=>c.id!==selectedCard.id);
  const newDiscard=safeDiscards(state.discardPiles);
  newDiscard[selectedCard.color]=[...newDiscard[selectedCard.color], selectedCard];

  await update(ref(db,`rooms/${roomId}/players/${myRole}`),{hand:newHand});
  await update(ref(db,`rooms/${roomId}`),{discardPiles:newDiscard, actionPhase:'draw'});
  selectedCard=null;
};

window.drawFrom = async function(source){
  await doDrawDeck();
};

async function doDrawDeck(){
  if(!gameState) return;
  const state=gameState;
  if(!isMyTurn(state)||state.actionPhase!=='draw') return;
  const deck=toArr(state.deck);
  if(deck.length===0) return;
  const card=deck.pop();
  const me=state.players[myRole];
  const newHand=[...toArr(me.hand), card];
  await update(ref(db,`rooms/${roomId}/players/${myRole}`),{hand:newHand});
  const nextTurn=myRole==='host'?'guest':'host';

  if(deck.length===0){
    await update(ref(db,`rooms/${roomId}`),{deck,actionPhase:'play',currentTurn:nextTurn,phase:'ended'});
  } else {
    await update(ref(db,`rooms/${roomId}`),{deck,actionPhase:'play',currentTurn:nextTurn});
  }
  selectedCard=null;
}

async function doDrawDiscard(color){
  if(!gameState) return;
  const state=gameState;
  if(!isMyTurn(state)||state.actionPhase!=='draw') return;
  const newDiscard=safeDiscards(state.discardPiles);
  const pile=newDiscard[color];
  if(pile.length===0) return;
  const card=pile.pop();
  newDiscard[color]=pile;
  const me=state.players[myRole];
  const newHand=[...toArr(me.hand), card];
  await update(ref(db,`rooms/${roomId}/players/${myRole}`),{hand:newHand});
  const nextTurn=myRole==='host'?'guest':'host';
  const deck=toArr(state.deck);
  if(deck.length===0){
    await update(ref(db,`rooms/${roomId}`),{discardPiles:newDiscard,actionPhase:'play',currentTurn:nextTurn,phase:'ended'});
  } else {
    await update(ref(db,`rooms/${roomId}`),{discardPiles:newDiscard,actionPhase:'play',currentTurn:nextTurn});
  }
  selectedCard=null;
}

// ── END SCREEN ──
function renderEndScreen(state){
  const hp=state.players['host'], gp=state.players['guest'];
  const hs=calcTotalScore(hp.expeditions), gs=calcTotalScore(gp.expeditions);
  const hName=hp.nickname||'방장', gName=gp.nickname||'게스트';
  let winner;
  if(hs>gs) winner=`🏆 ${hName} 승리!`;
  else if(gs>hs) winner=`🏆 ${gName} 승리!`;
  else winner='🤝 무승부!';
  $('winner-text').textContent=winner;

  let html=`<thead><tr><th>루트</th><th>${hName}</th><th>${gName}</th></tr></thead><tbody>`;
  for(const c of COLORS){
    const s0=calcExpeditionScore(hp.expeditions?.[c]||[]);
    const s1=calcExpeditionScore(gp.expeditions?.[c]||[]);
    html+=`<tr><td>${COLOR_KR[c]}</td>
      <td style="color:${s0>=0?'var(--green)':'var(--red)'}">${s0}</td>
      <td style="color:${s1>=0?'var(--green)':'var(--red)'}">${s1}</td></tr>`;
  }
  html+=`</tbody><tfoot><tr class="total-row"><td>합계</td><td>${hs}</td><td>${gs}</td></tr></tfoot>`;
  $('score-table').innerHTML=html;
  checkRematchStatus(state);
}

window.requestRematch = async function(){
  await update(ref(db,`rooms/${roomId}/rematch`),{[myRole]:true});
};

function checkRematchStatus(state){
  const r=state.rematch||{};
  if(r.host&&r.guest){
    // both agreed — reset game
    if(myRole==='host') resetGame();
    return;
  }
  const myReq=r[myRole]||false;
  const oppReq=r[oppKey()]||false;
  if(myReq) $('rematch-status').textContent='상대방 수락 대기 중...';
  else if(oppReq) $('rematch-status').textContent='상대방이 다시 하기를 요청했습니다!';
  $('btn-rematch').textContent=myReq?'요청됨':'다시 하기';
  $('btn-rematch').disabled=myReq;
}

async function resetGame(){
  const deck=createDeck();
  const hand0=[],hand1=[];
  for(let i=0;i<8;i++){ hand0.push(deck.pop()); hand1.push(deck.pop()); }
  const initExp={}, initDiscard={};
  for(const c of COLORS){ initExp[c]=[]; initDiscard[c]=[]; }

  const hNick=gameState.players.host.nickname;
  const gNick=gameState.players.guest.nickname;
  await set(ref(db,`rooms/${roomId}`),{
    phase:'playing',
    players:{
      host:{nickname:hNick,hand:hand0,expeditions:{...initExp}},
      guest:{nickname:gNick,hand:hand1,expeditions:{...initExp}}
    },
    deck, discardPiles:{...initDiscard},
    currentTurn:'host', actionPhase:'play',
    rematch:{host:false,guest:false}
  });
}

// ── AUTO JOIN FROM URL ──
const urlParams=new URLSearchParams(location.search);
const urlRoom=urlParams.get('room');
if(urlRoom){
  $('room-code-input').value=urlRoom;
  // hint user to enter nickname then join
  $('room-code-input').style.borderColor='var(--gold)';
  $('nickname-input').focus();
}
</script>
